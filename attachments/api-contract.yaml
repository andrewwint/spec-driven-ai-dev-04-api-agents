# Example API Contract (from Course 3)
openapi: 3.0.0
info:
  title: Model Prediction API
  version: 1.0.0
paths:
  /predict:
    post:
      summary: Get model prediction
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: string
      responses:
        "200":
          description: Prediction result
          content:
            application/json:
              schema:
                type: object
                properties:
                  prediction:
                    type: string
